name: ba_app
description: "InventarScan - Flutter-App zur lokalen Inventarverwaltung und bildbasierten Auswertung von Widerständen."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Zustandsverwaltung, Controller-Bereitstellung und Navigation.
  get: ^4.6.6

  # Lokale SQLite-Datenbank fuer Produkte, Lagerorte, Lagerplaetze und Ausleihen.
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.5

  # Fotos fuer Produkte und Scanbilder.
  image_picker: ^1.1.2

  # Bildzugriff und Pixelverarbeitung in Dart.
  image: ^4.5.4

  # Lokale Ausfuehrung des YOLO11n-Modells im TensorFlow-Lite-Format.
  tflite_flutter: ^0.12.1

  # QR-Code-Scan fuer Lagerplaetze.
  mobile_scanner: ^7.1.3

  # CSV-Export teilen und CSV-Datei fuer den Import auswaehlen.
  share_plus: ^13.1.0
  file_picker: ^12.0.0-beta.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/best_float32.tflite
